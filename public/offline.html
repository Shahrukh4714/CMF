<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Convertmyfiles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      background: #fafafa;
      color: #18181b;
    }
    .dark { background: #09090b; color: #fafafa; }
    .card {
      max-width: 28rem;
      text-align: center;
    }
    .icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1.5rem;
      border-radius: 0.75rem;
      background: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .dark .icon { background: #27272a; }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 0.75rem; }
    p { color: #71717a; line-height: 1.6; margin-bottom: 1.5rem; }
    .dark p { color: #a1a1aa; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      background: #18181b;
      color: #fafafa;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    .dark .btn { background: #fafafa; color: #09090b; }
    .btn:hover { opacity: 0.9; }
    .cached-note { font-size: 0.75rem; color: #a1a1aa; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#9881;</div>
    <h1>You&rsquo;re offline</h1>
    <p>Convertmyfiles needs a network connection to load. Previously visited tools may still be available.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <p class="cached-note">Your files never leave your device &mdash; even online.</p>
  </div>
  <script>
    try {
      if (localStorage.getItem('theme') === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark');
      }
    } catch (e) {}
  </script>
</body>
</html>
